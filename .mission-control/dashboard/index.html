<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mission Control — Avanço Informática</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-deep: #080a0f;
      --bg-base: #0f1117;
      --bg-card: #1a1d27;
      --bg-card-hover: #1f2333;
      --bg-elevated: #252938;
      --border: #2a2e3d;
      --border-subtle: #1e2130;
      --text-primary: #e2e8f0;
      --text-secondary: #8b92a8;
      --text-muted: #555b72;
      --green: #22c55e;
      --green-dim: #166534;
      --green-glow: rgba(34, 197, 94, 0.15);
      --yellow: #eab308;
      --yellow-dim: #854d0e;
      --yellow-glow: rgba(234, 179, 8, 0.15);
      --red: #ef4444;
      --red-dim: #991b1b;
      --red-glow: rgba(239, 68, 68, 0.15);
      --blue: #3b82f6;
      --blue-dim: #1e3a5f;
      --accent: #6366f1;
      --font-mono: 'JetBrains Mono', monospace;
      --font-sans: 'Outfit', sans-serif;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-deep);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
    }

    /* Scan-line overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.03) 2px,
        rgba(0, 0, 0, 0.03) 4px
      );
      z-index: 9999;
    }

    /* Noise texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.02;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      z-index: 9998;
    }

    #root { height: 100vh; display: flex; flex-direction: column; }

    /* ─── Top Bar ─── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 52px;
      background: var(--bg-base);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      position: relative;
    }

    .topbar::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.3;
    }

    .topbar-logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .topbar-logo .beacon {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green), 0 0 20px rgba(34, 197, 94, 0.3);
      animation: pulse-green 2s ease-in-out infinite;
    }

    .topbar-logo .beacon.offline {
      background: var(--text-muted);
      box-shadow: none;
      animation: none;
    }

    @keyframes pulse-green {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    @keyframes pulse-yellow {
      0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--yellow); }
      50% { opacity: 0.6; box-shadow: 0 0 16px var(--yellow); }
    }

    @keyframes pulse-red {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .topbar-logo h1 {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .topbar-logo h1 span {
      color: var(--text-primary);
    }

    .topbar-stats {
      display: flex;
      gap: 32px;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .stat-label {
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .stat-value {
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 400;
      color: var(--text-primary);
      letter-spacing: 0.5px;
    }

    /* ─── Layout ─── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ─── Sidebar ─── */
    .sidebar {
      width: 280px;
      background: var(--bg-base);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 16px 20px 12px;
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border-subtle);
    }

    .sidebar-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .process-item {
      padding: 12px 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 2px;
      border: 1px solid transparent;
    }

    .process-item:hover {
      background: var(--bg-card);
    }

    .process-item.selected {
      background: var(--bg-card);
      border-color: var(--border);
    }

    .process-item-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .process-name {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 2px 8px;
      border-radius: 3px;
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .badge-active { background: var(--green-glow); color: var(--green); }
    .badge-active .badge-dot { background: var(--green); animation: pulse-green 2s ease-in-out infinite; }

    .badge-completed { background: rgba(34, 197, 94, 0.08); color: var(--green-dim); }
    .badge-completed .badge-dot { background: var(--green-dim); }

    .badge-error { background: var(--red-glow); color: var(--red); }
    .badge-error .badge-dot { background: var(--red); animation: pulse-red 1.5s ease-in-out infinite; }

    .badge-waiting { background: var(--yellow-glow); color: var(--yellow); }
    .badge-waiting .badge-dot { background: var(--yellow); animation: pulse-yellow 1.8s ease-in-out infinite; }

    .badge-idle { background: rgba(85, 91, 114, 0.15); color: var(--text-muted); }
    .badge-idle .badge-dot { background: var(--text-muted); }

    .process-meta {
      display: flex;
      gap: 14px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
    }

    /* ─── Main Content ─── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg-deep);
    }

    /* ─── Agent Panel ─── */
    .agent-panel {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }

    .panel-header {
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    .agent-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 12px;
    }

    .agent-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 18px;
      transition: border-color 0.2s, background 0.2s;
    }

    .agent-card:hover {
      background: var(--bg-card-hover);
    }

    .agent-card.status-error {
      border-color: var(--red-dim);
      box-shadow: inset 0 0 20px var(--red-glow);
    }

    .agent-card.status-waiting {
      border-color: var(--yellow-dim);
    }

    .agent-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .agent-name {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
    }

    .agent-message {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 12px;
      line-height: 1.4;
      min-height: 16px;
    }

    .progress-bar-container {
      background: var(--bg-deep);
      border-radius: 3px;
      height: 6px;
      overflow: hidden;
      position: relative;
    }

    .progress-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.5s ease;
      position: relative;
    }

    .progress-bar-fill.green {
      background: linear-gradient(90deg, var(--green-dim), var(--green));
      box-shadow: 0 0 8px var(--green-glow);
    }

    .progress-bar-fill.yellow {
      background: linear-gradient(90deg, var(--yellow-dim), var(--yellow));
    }

    .progress-bar-fill.red {
      background: linear-gradient(90deg, var(--red-dim), var(--red));
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
    }

    /* ─── Task Table ─── */
    .task-panel {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: 0 24px 20px;
    }

    .task-panel .panel-header {
      padding-top: 20px;
    }

    .task-table-wrapper {
      flex: 1;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-card);
    }

    .task-table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--font-mono);
      font-size: 12px;
    }

    .task-table thead {
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .task-table th {
      background: var(--bg-elevated);
      padding: 10px 14px;
      text-align: left;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }

    .task-table td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border-subtle);
      color: var(--text-secondary);
      vertical-align: middle;
    }

    .task-table tr:last-child td {
      border-bottom: none;
    }

    .task-table tr:hover td {
      background: rgba(255, 255, 255, 0.015);
    }

    .task-progress-cell {
      width: 140px;
    }

    .task-progress-bar {
      background: var(--bg-deep);
      border-radius: 2px;
      height: 4px;
      overflow: hidden;
      margin-bottom: 3px;
    }

    .task-progress-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    .task-progress-label {
      font-size: 9px;
      color: var(--text-muted);
    }

    .status-text {
      font-weight: 500;
    }

    .status-text.started, .status-text.running { color: var(--green); }
    .status-text.completed { color: var(--green-dim); }
    .status-text.error { color: var(--red); }
    .status-text.waiting { color: var(--yellow); }

    /* ─── Empty state ─── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      color: var(--text-muted);
    }

    .empty-state-icon {
      font-size: 32px;
      opacity: 0.3;
    }

    .empty-state-text {
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.5px;
    }

    .empty-state-hint {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      opacity: 0.6;
    }

    /* ─── Scrollbar ─── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* ─── Animations ─── */
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animate-in {
      animation: fade-in 0.3s ease forwards;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ─── Helpers ───
    function getBadgeClass(status) {
      if (!status) return 'badge-idle';
      switch (status) {
        case 'active': case 'started': case 'running': return 'badge-active';
        case 'completed': return 'badge-completed';
        case 'error': return 'badge-error';
        case 'waiting': return 'badge-waiting';
        default: return 'badge-idle';
      }
    }

    function getStatusLabel(status) {
      const labels = {
        active: 'ATIVO', started: 'INICIADO', running: 'EXECUTANDO',
        completed: 'CONCLUÍDO', error: 'ERRO', waiting: 'AGUARDANDO', idle: 'OCIOSO'
      };
      return labels[status] || status?.toUpperCase() || 'OCIOSO';
    }

    function getProgressColor(status) {
      if (status === 'error') return 'red';
      if (status === 'waiting') return 'yellow';
      return 'green';
    }

    function countAgents(proc) {
      return Object.keys(proc.agents || {}).length;
    }

    function countTasks(proc) {
      let count = 0;
      for (const agent of Object.values(proc.agents || {})) {
        count += Object.keys(agent.tasks || {}).length;
      }
      return count;
    }

    function formatDuration(ms) {
      if (!ms || ms < 0) return '00:00';
      const secs = Math.floor(ms / 1000);
      const mins = Math.floor(secs / 60);
      const hrs = Math.floor(mins / 60);
      if (hrs > 0) return `${String(hrs).padStart(2,'0')}:${String(mins%60).padStart(2,'0')}:${String(secs%60).padStart(2,'0')}`;
      return `${String(mins).padStart(2,'0')}:${String(secs%60).padStart(2,'0')}`;
    }

    // ─── Badge Component ───
    function Badge({ status }) {
      const cls = getBadgeClass(status);
      return (
        <span className={`badge ${cls}`}>
          <span className="badge-dot"></span>
          {getStatusLabel(status)}
        </span>
      );
    }

    // ─── TopBar ───
    function TopBar({ state, connected, sessionStart }) {
      const [elapsed, setElapsed] = useState(0);

      useEffect(() => {
        if (!sessionStart) return;
        const iv = setInterval(() => setElapsed(Date.now() - sessionStart), 1000);
        return () => clearInterval(iv);
      }, [sessionStart]);

      const activeAgents = Object.values(state.processes || {}).reduce((sum, p) => {
        return sum + Object.values(p.agents || {}).filter(a =>
          a.status === 'running' || a.status === 'started'
        ).length;
      }, 0);

      return (
        <div className="topbar">
          <div className="topbar-logo">
            <div className={`beacon ${connected ? '' : 'offline'}`}></div>
            <h1><span>Mission</span> Control</h1>
          </div>
          <div className="topbar-stats">
            <div className="stat">
              <span className="stat-label">Session</span>
              <span className="stat-value">{state.session_id ? state.session_id.substring(0, 12) : '—'}</span>
            </div>
            <div className="stat">
              <span className="stat-label">Agentes Ativos</span>
              <span className="stat-value">{activeAgents}</span>
            </div>
            <div className="stat">
              <span className="stat-label">Eventos</span>
              <span className="stat-value">{state.event_count || 0}</span>
            </div>
            <div className="stat">
              <span className="stat-label">Duração</span>
              <span className="stat-value">{formatDuration(elapsed)}</span>
            </div>
          </div>
        </div>
      );
    }

    // ─── Sidebar ───
    function Sidebar({ processes, selected, onSelect }) {
      const items = Object.entries(processes || {});

      return (
        <div className="sidebar">
          <div className="sidebar-header">Processos</div>
          <div className="sidebar-list">
            {items.length === 0 ? (
              <div className="empty-state" style={{height: 'auto', padding: '40px 0'}}>
                <div className="empty-state-text">Nenhum processo</div>
                <div className="empty-state-hint">Aguardando eventos...</div>
              </div>
            ) : items.map(([name, proc]) => (
              <div
                key={name}
                className={`process-item ${selected === name ? 'selected' : ''}`}
                onClick={() => onSelect(name)}
              >
                <div className="process-item-header">
                  <span className="process-name">{name}</span>
                  <Badge status={proc.status} />
                </div>
                <div className="process-meta">
                  <span>{countAgents(proc)} agente{countAgents(proc) !== 1 ? 's' : ''}</span>
                  <span>{countTasks(proc)} tarefa{countTasks(proc) !== 1 ? 's' : ''}</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─── Agent Card ───
    function AgentCard({ name, agent }) {
      const latestTask = Object.values(agent.tasks || {}).sort((a, b) =>
        new Date(b.timestamp) - new Date(a.timestamp)
      )[0];

      const step = latestTask?.step || 0;
      const total = latestTask?.total_steps || 0;
      const pct = total > 0 ? Math.round((step / total) * 100) : 0;
      const message = latestTask?.message || '';
      const color = getProgressColor(agent.status);

      return (
        <div className={`agent-card status-${agent.status} animate-in`}>
          <div className="agent-card-header">
            <span className="agent-name">{name}</span>
            <Badge status={agent.status} />
          </div>
          <div className="agent-message">{message || '—'}</div>
          <div className="progress-bar-container">
            <div className={`progress-bar-fill ${color}`} style={{width: `${pct}%`}}></div>
          </div>
          <div className="progress-label">
            <span>{step}/{total} etapas</span>
            <span>{pct}%</span>
          </div>
        </div>
      );
    }

    // ─── Agent Panel ───
    function AgentPanel({ process }) {
      if (!process) {
        return (
          <div className="agent-panel">
            <div className="panel-header">Agentes</div>
            <div className="empty-state" style={{height: '120px'}}>
              <div className="empty-state-text">Selecione um processo</div>
            </div>
          </div>
        );
      }

      const agents = Object.entries(process.agents || {});

      return (
        <div className="agent-panel">
          <div className="panel-header">Agentes</div>
          {agents.length === 0 ? (
            <div className="empty-state" style={{height: '80px'}}>
              <div className="empty-state-text">Nenhum agente registrado</div>
            </div>
          ) : (
            <div className="agent-grid">
              {agents.map(([name, agent]) => (
                <AgentCard key={name} name={name} agent={agent} />
              ))}
            </div>
          )}
        </div>
      );
    }

    // ─── Task Table ───
    function TaskPanel({ process }) {
      const rows = [];
      if (process) {
        for (const [agentName, agent] of Object.entries(process.agents || {})) {
          for (const [taskName, task] of Object.entries(agent.tasks || {})) {
            rows.push({ agentName, taskName, ...task });
          }
        }
      }
      rows.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

      return (
        <div className="task-panel">
          <div className="panel-header">Tarefas</div>
          <div className="task-table-wrapper">
            {rows.length === 0 ? (
              <div className="empty-state" style={{height: '200px'}}>
                <div className="empty-state-icon">◇</div>
                <div className="empty-state-text">Nenhuma tarefa registrada</div>
                <div className="empty-state-hint">As tarefas aparecerão aqui conforme os agentes reportarem progresso</div>
              </div>
            ) : (
              <table className="task-table">
                <thead>
                  <tr>
                    <th>Agente</th>
                    <th>Tarefa</th>
                    <th>Status</th>
                    <th>Mensagem</th>
                    <th>Progresso</th>
                    <th>Timestamp</th>
                  </tr>
                </thead>
                <tbody>
                  {rows.map((row, i) => {
                    const pct = row.total_steps > 0 ? Math.round((row.step / row.total_steps) * 100) : 0;
                    const color = getProgressColor(row.status);
                    return (
                      <tr key={`${row.agentName}-${row.taskName}`} className="animate-in" style={{animationDelay: `${i * 30}ms`}}>
                        <td style={{color: 'var(--text-primary)'}}>{row.agentName}</td>
                        <td>{row.taskName}</td>
                        <td><span className={`status-text ${row.status}`}>{getStatusLabel(row.status)}</span></td>
                        <td>{row.message || '—'}</td>
                        <td className="task-progress-cell">
                          <div className="task-progress-bar">
                            <div className={`task-progress-bar-fill progress-bar-fill ${color}`} style={{width: `${pct}%`}}></div>
                          </div>
                          <span className="task-progress-label">{row.step}/{row.total_steps} ({pct}%)</span>
                        </td>
                        <td style={{fontSize: '10px', color: 'var(--text-muted)'}}>
                          {row.timestamp ? new Date(row.timestamp).toLocaleTimeString('pt-BR') : '—'}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            )}
          </div>
        </div>
      );
    }

    // ─── App ───
    function App() {
      const [state, setState] = useState({ processes: {}, hooks: [], session_id: null, event_count: 0 });
      const [selected, setSelected] = useState(null);
      const [connected, setConnected] = useState(false);
      const [sessionStart] = useState(Date.now());
      const wsRef = useRef(null);

      // Apply incremental event to state
      const applyEvent = useCallback((evt) => {
        setState(prev => {
          const next = { ...prev, event_count: (prev.event_count || 0) + 1 };
          next.processes = { ...prev.processes };
          if (evt.session_id) next.session_id = evt.session_id;

          if (evt.type === 'process_start' && evt.process) {
            next.processes[evt.process] = { ...next.processes[evt.process], status: 'active', agents: next.processes[evt.process]?.agents || {} };
          } else if (evt.type === 'process_end' && evt.process && next.processes[evt.process]) {
            next.processes[evt.process] = { ...next.processes[evt.process], status: 'completed' };
          } else if (evt.type === 'progress' && evt.process) {
            if (!next.processes[evt.process]) {
              next.processes[evt.process] = { status: 'active', agents: {} };
            }
            const proc = { ...next.processes[evt.process], agents: { ...next.processes[evt.process].agents } };
            next.processes[evt.process] = proc;

            if (evt.agent) {
              if (!proc.agents[evt.agent]) {
                proc.agents[evt.agent] = { status: 'running', tasks: {} };
              }
              const agent = { ...proc.agents[evt.agent], tasks: { ...proc.agents[evt.agent].tasks } };
              proc.agents[evt.agent] = agent;
              agent.status = evt.payload?.status || agent.status;

              if (evt.task) {
                agent.tasks[evt.task] = {
                  status: evt.payload?.status || 'running',
                  step: evt.payload?.step || 0,
                  total_steps: evt.payload?.total_steps || 0,
                  message: evt.payload?.message || '',
                  timestamp: evt.timestamp
                };
              }
            }
          } else if (evt.type === 'tool_start' || evt.type === 'tool_end' || evt.type === 'tool_error') {
            next.hooks = [...(prev.hooks || []), {
              type: evt.type, tool: evt.payload?.tool, input_preview: evt.payload?.input_preview, timestamp: evt.timestamp
            }];
          }

          return next;
        });
      }, []);

      // Fetch initial state
      useEffect(() => {
        fetch('/state')
          .then(r => r.json())
          .then(data => {
            setState(data);
            // Auto-select first process
            const procs = Object.keys(data.processes || {});
            if (procs.length > 0 && !selected) setSelected(procs[0]);
          })
          .catch(() => {});
      }, []);

      // WebSocket connection
      useEffect(() => {
        function connect() {
          const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
          const ws = new WebSocket(`${proto}//${location.host}`);
          wsRef.current = ws;

          ws.onopen = () => setConnected(true);
          ws.onclose = () => {
            setConnected(false);
            setTimeout(connect, 2000);
          };
          ws.onmessage = (e) => {
            try {
              const evt = JSON.parse(e.data);
              applyEvent(evt);
              // Auto-select new process if none selected
              if (evt.process) {
                setSelected(prev => prev || evt.process);
              }
            } catch {}
          };
        }
        connect();
        return () => { if (wsRef.current) wsRef.current.close(); };
      }, [applyEvent]);

      const selectedProcess = selected ? state.processes?.[selected] : null;

      return (
        <div id="root" style={{height: '100vh', display: 'flex', flexDirection: 'column'}}>
          <TopBar state={state} connected={connected} sessionStart={sessionStart} />
          <div className="layout">
            <Sidebar processes={state.processes} selected={selected} onSelect={setSelected} />
            <div className="main">
              <AgentPanel process={selectedProcess} />
              <TaskPanel process={selectedProcess} />
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
